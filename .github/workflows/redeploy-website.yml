name: Trigger website redeploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  redeploy-website:
    runs-on: ubuntu-latest
    steps:
      - name: Check redeploy token
        env:
          WEBSITE_REDEPLOY_TOKEN: ${{ secrets.WEBSITE_REDEPLOY_TOKEN }}
        run: test -n "${WEBSITE_REDEPLOY_TOKEN}"

      - name: Trigger website deploy
        env:
          WEBSITE_REDEPLOY_TOKEN: ${{ secrets.WEBSITE_REDEPLOY_TOKEN }}
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${WEBSITE_REDEPLOY_TOKEN}" \
            https://api.github.com/repos/dragutin-oreski/website/dispatches \
            -d '{"event_type":"ui-suputnik-updated"}'
